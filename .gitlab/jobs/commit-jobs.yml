# ============================================================
# Commit Output Job
# ============================================================
# Rebuilds the README with current content and today's date,
# then commits all generated resume files from output/ and
# the updated README back to the repository.
#
# [skip ci] in the commit message tells GitLab to skip creating
# a pipeline for this push. Without it, the push would trigger
# another pipeline (since it targets a branch), and the pipeline
# would trigger another push -- an infinite loop. [skip ci] is
# evaluated before workflow: rules, so it reliably breaks the cycle.
# NICE!
# ============================================================

# ------------------------------------------------------------
# Stage 3: Rebuild README with today's date and push all output
#
# `dependencies: [compile_resume]` downloads the artifacts from
# compile_resume into this job's workspace. This is how the
# compiled output/ files get here -- the job itself doesn't run
# Docker or make; it just receives the finished files via artifacts
# and commits them.
#
# `dependencies:` controls artifact download.
# `needs:` controls execution order (DAG).
# This job uses neither `needs:` nor stage skipping -- it
# simply waits for the full compile stage to finish first,
# which is the correct default behavior for the commit stage.
# ------------------------------------------------------------
commit_output:
  stage: commit
  image: alpine:latest
  before_script:
    - apk add --no-cache git tzdata
  script:

    # --------------------------------------------------------
    # Rebuild the README
    # --------------------------------------------------------
    # YAML `|` starts a literal block scalar -- everything indented
    # beneath it is passed to the shell as a single multi-line string.
    # Inside that string, `<< RESUME_README_EOF` is a shell heredoc with
    # an unquoted delimiter, which allows GitLab CI variable expansion
    # (e.g. ${CI_PROJECT_URL}, ${GITLAB_USER_NAME}). Backtick characters
    # inside the heredoc body are escaped with a backslash so the shell
    # does not interpret them as command substitutions.
    - |
      cat > README.md << RESUME_README_EOF
      # Welcome to [${GITLAB_USER_NAME}](${CI_SERVER_URL}/${CI_PROJECT_NAMESPACE})' Resume's CI/CD
      * * *
      ![Daily resume generator with LaTeX and Pandoc](https://raw.githubusercontent.com/MarcusHoltz/marcusholtz.github.io/refs/heads/main/assets/img/header/header--devops--resume-generator.jpg "Generate a resume, daily, forever!")
      * * *
      ## Introduction
      ![pipeline](${CI_PROJECT_URL}/badges/${CI_DEFAULT_BRANCH}/pipeline.svg)  ![gitlab](https://badgen.net/badge/icon/gitlab?icon=gitlab&label)  ![docker](https://badgen.net/badge/icon/docker?icon=docker&label)

      This repository keeps my resume **up to date**. Builds are done **daily**.

      You can find **[the most recent builds](output/)** of my resume.


      * * *
      ## Required Setup
      > **This pipeline will fail to push without a Project Access Token.**
      > GitLab CI job tokens are read-only by default (GitLab ≥ 15.9) and cannot
      > write commits back to the repository. Two one-time steps are required.

      ### Step 1 — Create a Project Access Token
      1. Go to **Settings > Access Tokens**
      2. Fill in the form:
         - Name: \`gitlab-ci-push\`
         - Role: **Maintainer**
         - Scopes: **write\_repository**
      3. Click **Create project access token** and copy the value immediately — it is shown only once.

      ### Step 2 — Store the token as a masked CI/CD variable
      1. Go to **Settings > CI/CD > Variables**
      2. Click **Add variable** and fill in:
         - Key: \`PROJECT_ACCESS_TOKEN\`
         - Value: *(paste the token from Step 1)*
         - **Mask variable: on** — keeps the value out of job logs
         - Expand variable reference: off
      3. Save.

      The pipeline's commit job reads \`\$PROJECT_ACCESS_TOKEN\` at runtime to authenticate the \`git push\`.
      Without it, the push step exits with a 403 and the job fails.


      * * *
      ## Usage
      ### GitLab CI/CD
      If you want GitLab CI/CD to run this docker container and update the repository,
      you must first complete the **Required Setup** above, then ensure a runner is
      enabled for this project under:

       \`Settings > CI/CD > Runners\`


      Be sure to review the pipeline configuration in \`.gitlab-ci.yml\` and the \`.gitlab/\` directory.


      ### Docker auto-generate resumes
      If you would like to run this locally on your machine (\`docker compose up --build -d\`), first clone or download the repository.

      Edit the \`compose.yml\` to uncomment the \`command\` **or** \`entrypoint\`.
      With that change, when you run the container it will generate documents in the \`output\` folder for any markdown files in the \`input\` folder.

      Then, edit \`dockerfile\`. At the bottom of the file, you will see two commented lines:

      \`# RUN useradd --user-group --create-home --shell /bin/false app\`

      \`# USER app\`

      Uncomment these lines to have the output files created as a non-root user.


      * * *
      ## References
      [Pandoc](https://github.com/pandoc/dockerfiles)

      [Inspiration](https://github.com/mszep/pandoc_resume)

      [LaTeX template](https://github.com/LukeSmithxyz/md-website-cv)




      RESUME_README_EOF

    # Append the current date in Mountain Time.
    # TZ='America/Denver' sets the timezone for just the date command.
    # Using a named timezone (via tzdata) is more accurate than a fixed
    # -6 hour offset because it handles daylight saving time automatically.
    - 'echo "## The current date:  " >> README.md'
    - echo " $(TZ='America/Denver' date +'%m/%d/%Y') " >> README.md
    - echo "  " >> README.md
    - echo "  " >> README.md

    # --------------------------------------------------------
    # Commit and push
    # --------------------------------------------------------
    # $GITLAB_USER_EMAIL and $GITLAB_USER_NAME are GitLab predefined
    # variables automatically set to the triggering user's account.
    # For scheduled pipelines, this is the user who created the schedule.
    # The custom $GIT_USER_EMAIL / $GIT_USER_NAME from variables-git.yml
    # are only used as a fallback if you explicitly set them in
    # Settings > CI/CD > Variables to override the triggering user.
    - git config user.email "${GITLAB_USER_EMAIL:-$GIT_USER_EMAIL}"
    - git config user.name "${GITLAB_USER_NAME:-$GIT_USER_NAME}"

    # CI_JOB_TOKEN is read-only by default on GitLab.com (≥ 15.9) and
    # cannot push to protected branches. A Project Access Token stored as
    # a masked CI/CD variable is required instead.
    #
    # One-time setup (do this in the GitLab UI, not here):
    #   1. Settings > Access Tokens
    #        Name: gitlab-ci-push   Role: Maintainer
    #        Scopes: write_repository   → copy the token value
    #   2. Settings > CI/CD > Variables
    #        Key: PROJECT_ACCESS_TOKEN   Value: <paste token>
    #        Mask variable: yes (hides it from job logs)
    #        Expand variable reference: no
    #
    # The oauth2 username works with both project and personal access tokens.
    - git remote set-url origin "https://oauth2:${PROJECT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"

    # Stage only the files we generated -- avoids accidentally committing
    # any other workspace changes the runner may have introduced.
    - git add output/ README.md

    # Only commit if something actually changed. `git diff --staged --quiet`
    # exits 0 (success, no diff) or 1 (diff exists). The `||` means: if
    # there IS a diff, run the commit. If the resumes are identical to last
    # time (unlikely but possible), the job skips the commit and still pushes
    # the unchanged HEAD -- which is a clean no-op push.
    - git diff --staged --quiet || git commit -m "Update compiled resumes [skip ci]"
    - git push origin HEAD:${CI_COMMIT_REF_NAME}

  # after_script runs in the same container after script: completes,
  # even if script: failed. Useful for cleanup, notifications, or a
  # final status line that always appears in the job log.
  after_script:
    - |
      echo "=== Pipeline complete: $(TZ='America/Denver' date +'%m/%d/%Y at %I:%M %p') Mountain Time ==="

  dependencies:
    - compile_resume
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: on_success
    - when: never
